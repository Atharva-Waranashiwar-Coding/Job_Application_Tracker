server:
  port: 8080

spring:
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/job_tracker}
    username: ${JDBC_DATABASE_USERNAME:job_tracker}
    password: ${JDBC_DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    initialization-mode: never
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:change-me-please-change-this-secret-to-a-longer-value}
  issuer: ${JWT_ISSUER:job-tracker}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

password:
  reset:
    token-expiration-ms: ${PASSWORD_RESET_TOKEN_EXPIRATION_MS:3600000}

app:
  security:
    cors:
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
    login:
      max-attempts: ${APP_LOGIN_MAX_ATTEMPTS:5}
      window-ms: ${APP_LOGIN_WINDOW_MS:600000}
      lockout-ms: ${APP_LOGIN_LOCKOUT_MS:900000}

logging:
  level:
    root: INFO
    org.springframework: INFO
