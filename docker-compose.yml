services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: job_tracker
      POSTGRES_USER: job_tracker
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      JDBC_DATABASE_URL: jdbc:postgresql://db:5432/job_tracker
      JDBC_DATABASE_USERNAME: job_tracker
      JDBC_DATABASE_PASSWORD: password
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  db-data:
